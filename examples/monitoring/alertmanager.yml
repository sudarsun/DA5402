route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 5s
  repeat_interval: 30s
  receiver: 'web.hook'
receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'https://webhook.site/6d2e7462-01a6-4586-adc1-b9ea2cabbd4b'  # TO BE CHANGED TO YOUR OWN WEBHOOK URL
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
